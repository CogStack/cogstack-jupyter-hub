{{- if not .Values.securityFiles.existingSecret }}
{{- if and (not .Values.securityFiles.useBundled) (eq (trim .Values.securityFiles.cookieSecret) "") }}
{{- fail "securityFiles.cookieSecret is required when securityFiles.useBundled=false and no existingSecret is set" }}
{{- end }}
{{- if and (not .Values.securityFiles.useBundled) (eq (trim .Values.securityFiles.tlsKey) "") }}
{{- fail "securityFiles.tlsKey is required when securityFiles.useBundled=false and no existingSecret is set" }}
{{- end }}
{{- if and (not .Values.securityFiles.useBundled) (eq (trim .Values.securityFiles.tlsCert) "") }}
{{- fail "securityFiles.tlsCert is required when securityFiles.useBundled=false and no existingSecret is set" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cogstack-jupyterhub.secretName" . }}
  labels:
    {{- include "cogstack-jupyterhub.labels" . | nindent 4 }}
type: Opaque
stringData:
  jupyterhub_cookie_secret: |
{{- if ne (trim .Values.securityFiles.cookieSecret) "" }}
{{- .Values.securityFiles.cookieSecret | nindent 4 }}
{{- else }}
{{- .Files.Get "files/config/jupyterhub_cookie_secret" | nindent 4 }}
{{- end }}
  nifi.key: |
{{- if ne (trim .Values.securityFiles.tlsKey) "" }}
{{- .Values.securityFiles.tlsKey | nindent 4 }}
{{- else }}
{{- .Files.Get "files/security/nifi.key" | nindent 4 }}
{{- end }}
  nifi.pem: |
{{- if ne (trim .Values.securityFiles.tlsCert) "" }}
{{- .Values.securityFiles.tlsCert | nindent 4 }}
{{- else }}
{{- .Files.Get "files/security/nifi.pem" | nindent 4 }}
{{- end }}
{{- end }}
